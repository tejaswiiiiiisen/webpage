<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lost in a world of reverie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
overflow:hidden;

}

/* Background */

body::before{

content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#4b1f00,#000 70%);
z-index:-3;

}

/* Fireflies */

.firefly{

position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:#FFD54A;
box-shadow:
0 0 8px gold,
0 0 18px gold,
0 0 30px gold;

animation:fly linear infinite;

}

@keyframes fly{

0%{
transform:translateY(-120vh);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(120vh);
opacity:0;
}

}

/* Card */

.container{

  position:relative;
    width:min(92vw,900px);
    margin-top:190px;   /* 👈 Image neeche aa jayegi */
    animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

}

/* Image */

img{

width:100%;
display:block;
border-radius:25px;
box-shadow:
0 0 50px rgba(255,180,0,.4);

}

/* Hover Glow */

.hotspot{

position:absolute;
cursor:pointer;
border-radius:15px;
transition:.3s;

}

.hotspot:hover{

background:rgba(255,255,255,.15);
box-shadow:
0 0 25px gold;

}

/* LEFT GIFT */

.leftGift{

left:18%;
bottom:18%;
width:16%;
height:20%;

}

/* RIGHT GIFT */

.rightGift{

right:12%;
bottom:17%;
width:16%;
height:20%;

}

/* BOY */

.boy{

right:8%;
top:18%;
width:33%;
height:60%;

}

/* Music Button */

.music{

position:fixed;
top:25px;
right:25px;

width:60px;
height:60px;

border:none;
border-radius:50%;

background:#FFD54A;
font-size:26px;
cursor:pointer;

box-shadow:0 0 25px gold;

transition:.3s;

}

.music:hover{

transform:scale(1.1);

}

.title{
      position:fixed;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:999;

    padding:14px 35px;

    font-size:38px;
    font-weight:800;
    letter-spacing:2px;

    color:#fff;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:2px solid rgba(255,215,0,.4);
    border-radius:50px;

    box-shadow:
    0 0 15px rgba(255,215,0,.6),
    0 0 35px rgba(255,140,0,.5),
    inset 0 0 15px rgba(255,255,255,.15);

    text-shadow:
    0 0 10px gold,
    0 0 20px orange,
    0 0 30px gold;

    animation:glowTitle 2s ease-in-out infinite alternate;
}

@keyframes glowTitle{

    0%{
        transform:translateX(-50%) scale(1);
        box-shadow:
        0 0 15px gold,
        0 0 30px orange;
    }

    100%{
        transform:translateX(-50%) scale(1.05);
        box-shadow:
        0 0 30px gold,
        0 0 60px orange;
    }

}
#welcome{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#welcome h1{
    color:#fff;
    font-size:38px;
    margin-bottom:30px;
    text-shadow:0 0 15px gold;
}

#yesBtn{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#FFD54A;
    color:#000;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 0 20px gold;
    transition:.3s;
}
.buttons{
    display:flex;
    gap:20px;
}

#yesBtn,
#noBtn{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#FFD54A;
    color:#000;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 0 20px gold;
    transition:.3s;
}

#yesBtn:hover,
#noBtn:hover{
    transform:scale(1.08);
}

#yesBtn:hover{
    transform:scale(1.08);
}

</style>

</head>

<body>

<div id="welcome">
    <h1>Do You Still Remember Me? </h1>

    <div class="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">Yes </button>
</div>
</div>
<div class="title">
Happy brithday
</div>

<div class="container">

<img src="Gemini_Generated_Image_sk7jbisk7jbisk7j.png" alt="Lost in a world of reverie Image">

<a
class="hotspot leftGift"
href="IMG_2249.MP4"
target="_blank"
onclick="stopMusic()">
</a>


<a
class="hotspot rightGift"
href="IMG_2249.MP4"
target="_blank"
onclick="stopMusic()">
</a>


<a 
class="hotspot boy"
href="IMG_2249.MP4"
target="_blank"
onclick="stopMusic()">
</a>

</div>
<audio id="bgmusic" autoplay loop playsinline>
    <source src="WhatsApp Audio 2026-07-10 at 7.53.21 AM.mpeg" type="audio/mpeg">
</audio>

<script>

/* Fireflies */

for(let i=0;i<70;i++){

    let f=document.createElement("div");

    f.className="firefly";

    f.style.left=Math.random()*100+"vw";

    f.style.animationDuration=8+Math.random()*10+"s";

    f.style.animationDelay=Math.random()*8+"s";

    f.style.transform=`scale(${0.5+Math.random()*1.5})`;

    document.body.appendChild(f);

}

const music = document.getElementById("bgmusic");
music.volume = 0.5;

function startSurprise() {
    music.play().catch(() => {});
    document.getElementById("welcome").style.display = "none";
}

document.getElementById("yesBtn").addEventListener("click", startSurprise);
document.getElementById("noBtn").addEventListener("click", startSurprise);
  function stopMusic(){
    const music = document.getElementById("bgmusic");
    music.pause();
}
</script>
</body>
</html>
