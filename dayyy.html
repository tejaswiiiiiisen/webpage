<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters Never Fade</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
font-family:'Cormorant Garamond',serif;
background:
linear-gradient(rgba(20,16,12,.65),rgba(20,16,12,.65)),
url("https://images.unsplash.com/photo-1510936111840-65e151ad71bb?auto=format&fit=crop&w=1400&q=80");
background-size:cover;
background-position:center;
overflow:auto;
}

.paper{

width:850px;
max-width:95%;
background:#f7edd8;
padding:50px;
border-radius:8px;
box-shadow:
0 0 60px rgba(0,0,0,.5),
inset 0 0 40px rgba(135,94,32,.15);

background-image:
repeating-linear-gradient(
transparent,
transparent 33px,
rgba(0,0,0,.05) 34px
);

position:relative;

animation:fade 1.3s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.paper::before{

content:"";
position:absolute;
inset:10px;
border:2px solid rgba(90,55,20,.2);
pointer-events:none;
}

h1{

text-align:center;
font-family:'Dancing Script',cursive;
font-size:58px;
color:#4d3114;
margin-bottom:5px;
}

.subtitle{

text-align:center;
font-size:20px;
color:#6e5233;
margin-bottom:40px;
font-style:italic;
}

label{

display:block;
margin-top:20px;
font-size:23px;
color:#55361d;
font-weight:bold;
}

input,textarea{

width:100%;
margin-top:10px;
padding:16px;
font-size:20px;
border:none;
outline:none;
background:transparent;
border-bottom:2px solid rgba(90,60,25,.25);
font-family:'Cormorant Garamond',serif;
color:#3e2b1b;
resize:none;
}

textarea{
height:170px;
}

button{

margin-top:35px;
padding:15px 45px;
font-size:20px;
background:#5b3a1d;
color:white;
border:none;
border-radius:40px;
cursor:pointer;
transition:.3s;
font-family:'Cormorant Garamond',serif;
}

button:hover{

background:#7b5028;
transform:translateY(-3px);
}

.footer{

margin-top:45px;
text-align:center;
font-size:20px;
color:#6e5233;
font-style:italic;
}

@media(max-width:700px){

.paper{
padding:30px;
}

h1{
font-size:42px;
}

}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(5px);
}

.popup-content{

width:420px;
max-width:90%;
background:#f7edd8;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.45);
animation:pop .4s ease;
}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.popup-content h2{

color:#5b3a1d;
margin-bottom:15px;
font-size:34px;
font-family:'Dancing Script',cursive;

}

.popup-content p{

font-size:22px;
line-height:1.7;
color:#5a4127;

}

.number-box{

margin:25px auto;
padding:18px;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
color:#075E54;
border:2px dashed #075E54;
border-radius:12px;
background:#ecfff5;

}

.whatsapp-btn{

display:inline-block;
margin-top:10px;
padding:14px 35px;
background:#25D366;
color:white;
text-decoration:none;
font-size:20px;
border-radius:40px;
transition:.3s;

}

.whatsapp-btn:hover{

background:#1da851;
transform:translateY(-2px);

}

.close-btn{

margin-top:20px;
padding:12px 30px;
border:none;
background:#5b3a1d;
color:white;
font-size:18px;
border-radius:30px;
cursor:pointer;

}

.close-btn:hover{

background:#7b5028;

}

</style>

</head>
<body>

<div class="paper">

<h1>Letters Left Between Time</h1>

<p class="subtitle">
Some thoughts are too beautiful to stay unspoken.<br>
Some memories deserve a place where time can never erase them.<br>
Tonight, this page belongs only to you.
</p>
<label>Your Name</label>
<input type="text" id="name" placeholder="How should this letter remember you?">

<label>What's Living Inside Your Heart?</label>
<textarea id="heart" placeholder="Write whatever your heart has been carrying..."></textarea>

<label>Tell Me About Your Last 365 Days</label>
<textarea id="year" placeholder="How has life treated you during the past year?"></textarea>

<label>If Your Heart Could Speak...</label>
<textarea id="speak" placeholder="If there is something you've never told anyone..."></textarea>

<label>One Thing You Wish Life Had Given You</label>
<textarea id="wish" placeholder="If you could ask life for just one thing..."></textarea>

<label>Write a Letter to Your Future Self</label>
<textarea id="future" placeholder="Imagine reading this one year from today."></textarea>

<label>One Sentence That Should Never Be Forgotten</label>
<textarea id="sentence" placeholder="Leave one sentence..."></textarea>

<center>
<button onclick="sendWhatsApp()">Seal This Letter ✉️</button>
</center>



</div>



<br>

<button class="close-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

</div>
<script>
function sendWhatsApp() {

    let name = document.getElementById("name").value;
    let heart = document.getElementById("heart").value;
    let year = document.getElementById("year").value;
    let speak = document.getElementById("speak").value;
    let wish = document.getElementById("wish").value;
    let future = document.getElementById("future").value;
    let sentence = document.getElementById("sentence").value;

    let message =
`📜 *Letters Left Between Time*

👤 *Your Name*
${name}

❤️ *What's Living Inside Your Heart?*
${heart}

📅 *Tell Me About Your Last 365 Days*
${year}

💭 *If Your Heart Could Speak...*
${speak}

🌈 *One Thing You Wish Life Had Given You*
${wish}

✍️ *Write a Letter to Your Future Self*
${future}

📖 *One Sentence That Should Never Be Forgotten*
${sentence}

❤️ Thank you for sharing your story.`;

    let url = "https://wa.me/918209925051?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}

function showWhatsApp() {
    document.getElementById("whatsappCard").style.display = "flex";

    // WhatsApp bhi open hoga
    sendWhatsApp();
}

function closePopup() {
    document.getElementById("whatsappCard").style.display = "none";
}
</script>
</body>
</html>
